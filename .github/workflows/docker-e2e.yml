name: NestJS API CI

on:
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [relational, document]
    steps:
      - uses: actions/checkout@v4
      - name: Run dockerized e2e tests
        run: docker compose -f docker-compose.${{ matrix.database }}.ci.yaml --env-file env-example-${{ matrix.database }} -p ci-${{ matrix.database }} up --build --exit-code-from api
      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.${{ matrix.database }}.ci.yaml -p ci-${{ matrix.database }} down -v

